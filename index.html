<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comfort Publish</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="wrap">
    <div class="header-area">
      <header class="header">
        <div class="inner">
          <h1 class="logo">
            <a href="#">
              <img src="./assets/images/common/logo-comfort.png" alt="컴포트 성형외과" />
            </a>
          </h1>
          <button type="button" class="btn-menu" aria-label="메뉴 열기">Menu</button>
          <nav class="gnb" aria-label="주 메뉴">
            <ul class="group-11">
              <li class="gnb-item gnb-intro is-active" data-menu="intro"><a href="#">컴포트 소개</a></li>
              <li class="gnb-item gnb-tattoo" data-menu="tattoo"><a href="#">문신제거</a></li>
              <li class="gnb-item gnb-anesthesia" data-menu="anesthesia"><a href="#">컴포트 마취</a></li>
              <li class="gnb-item gnb-injection" data-menu="injection"><a href="#">주사시술</a></li>
            </ul>
          </nav>
        </div>
      </header>
      <div class="rectangle-1-copy">
        <div class="inner">
          <div class="comfort-intro-group">
            <div class="hover-quick-menu" id="hoverQuickMenu"></div>
          </div>
        </div>
      </div>
    </div>

    <main class="container">
      <section id="mv">
        <div class="rectangle-2"></div>
        <div class="bu6i4108-1"></div>
        <div class="mv-content">
          <h2 class="comfort-plastic-surgery">COMFORT PLASTIC SURGERY</h2>
          <p class="mv-desc">컴포트는 환자분의 만족과 안전을 생각합니다.</p>
        </div>
      </section>

      <section id="sec2">
        <div class="sec2-layer">
          <div class="left">
            <div class="dul-2371"></div>
          </div>

          <div class="logo-symbol">
            <img src="./assets/images/main/mv-symbol-comfort.png" alt="컴포트 심볼 로고" class="shape-9" />
            <svg class="comfort-palstic-surgery-comfort-palstic-surgery" viewBox="0 0 144 150" aria-hidden="true">
              <defs>
                <path id="logo-circle-text-path" d="M 72,75 m -60,0 a 60,60 0 1,1 120,0 a 60,60 0 1,1 -120,0" />
              </defs>
              <text class="logo-ring-text" textLength="364" lengthAdjust="spacingAndGlyphs">
                <textPath href="#logo-circle-text-path" startOffset="0%">
                  Comfort Plastic Surgery Comfort Plastic Surgery
                </textPath>
              </text>
            </svg>
          </div>

          <div class="sec2-title-block">
            <p class="sec2-title-kicker" id="sec2Kicker">COMFORT PS: Tattoo Removal</p>
            <h3 class="sec2-title-main">
              <span class="sec2-title-main-track" id="sec2MainTitle">통증은 줄이고 효과는 높인 문신제거</span>
            </h3>
            <strong class="sec2-service-title" id="sec2ServiceTitle">피코 문신제거</strong>
            <p class="sec2-service-desc" id="sec2ServiceDesc">피코레이저로 문신에 맞춰 효과적이고 세밀한 시술이 가능합니다.</p>
            <a href="#" class="sec2-detail-btn">자세히 보기</a>

            <ul class="sec2-tabs" id="sec2Tabs">
              <li class="is-active"><button type="button" data-tab="pico"><span class="sec2-tab-label">피코<br>문신제거</span></button></li>
              <li><button type="button" data-tab="semi"><span class="sec2-tab-label">반영구<br>문신제거</span></button></li>
              <li><button type="button" data-tab="scalp"><span class="sec2-tab-label">두피<br>문신제거</span></button></li>
              <li><button type="button" data-tab="surgical"><span class="sec2-tab-label">수술적<br>문신제거</span></button></li>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="./js/main.js"></script>
</body>
</html>
